name: Deploy linkedin-carousel to GitHub Pages

on:
  push:
    branches: [main, master]
    paths:
      - 'linkedin-carousel/**'
      - '.github/workflows/deploy-linkedin-carousel-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: linkedin-carousel/package-lock.json
      - name: Install dependencies
        working-directory: linkedin-carousel
        run: npm ci
      - name: Build site
        working-directory: linkedin-carousel
        run: npm run build
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: linkedin-carousel/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
